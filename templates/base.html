<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ForecastPro{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            color: #1e3a5f;
        }

        .navbar {
            width: 92%;
            margin: 20px auto;
            background: #fff;
            border-radius: 14px;
            padding: 20px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .navbar h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
        }

        .nav-links a {
            text-decoration: none;
            color: #334155;
            font-weight: 600;
            margin-left: 30px;
            font-size: 16px;
        }

        .nav-links a:hover {
            color: #2563eb;
        }

        .container {
            width: 92%;
            margin: 0 auto 40px auto;
        }

        .section-box {
            background: white;
            border-radius: 14px;
            padding: 28px;
            margin-bottom: 30px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 22px 0;
            color: #274472;
        }

        .sub-title {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 18px 0;
            color: #274472;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        label {
            font-size: 17px;
            font-weight: 600;
        }

        select,
        input[type="file"],
        input[type="text"] {
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            min-width: 150px;
            background: white;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 28px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 28px 30px;
            border-left: 5px solid #3b82f6;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            min-height: 120px;
        }

        .card-label {
            color: #5b6777;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .card-value {
            color: #17324d;
            font-size: 24px;
            font-weight: 800;
            word-break: break-word;
        }

        .chart-wrap {
            background: white;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            margin-bottom: 30px;
        }

        .chart-box {
            position: relative;
            height: 420px;
        }

        .muted {
            color: #64748b;
            font-size: 14px;
        }

        #chatbotToggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #2563eb;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 26px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.18);
            z-index: 9999;
        }

        #chatbotPanel {
            position: fixed;
            bottom: 95px;
            right: 24px;
            width: 360px;
            max-height: 520px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 32px rgba(0,0,0,0.18);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 9999;
        }

        #chatMessages {
            padding: 14px;
            height: 360px;
            overflow-y: auto;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 10px;
            color: #1e293b;
        }

        .chat-input-row {
            display: flex;
            gap: 8px;
            padding: 12px;
            border-top: 1px solid #e2e8f0;
        }

        .chat-send-btn {
            padding: 10px 14px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        @media (max-width: 1200px) {
            .card-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .navbar {
                flex-direction: column;
                gap: 14px;
                align-items: flex-start;
            }

            .nav-links a {
                margin-left: 0;
                margin-right: 18px;
            }
        }

        @media (max-width: 600px) {
            .card-grid {
                grid-template-columns: 1fr;
            }

            .card-value {
                font-size: 22px;
            }

            .section-title {
                font-size: 22px;
            }

            #chatbotPanel {
                width: calc(100% - 24px);
                right: 12px;
                left: 12px;
                bottom: 90px;
            }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>ForecastPro</h1>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/customers">Customers</a>
            <a href="/compare">Compare</a>
            <a href="/explore">Graphs</a>
            <a href="/upload">Upload</a>
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <div id="chatbotToggle">💬</div>

    <div id="chatbotPanel">
        <div style="background:#2563eb; color:white; padding:14px 16px; font-weight:700;">
            ForecastPro AI Assistant
        </div>

        <div id="chatMessages">
            <div style="
                align-self: flex-start;
                background: white;
                padding: 10px 12px;
                border-radius: 12px;
                max-width: 85%;
                box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            ">
                Ask me about store KPIs, churn, promo impact, uploaded data, or forecasts.
            </div>
        </div>

        <div class="chat-input-row">
            <input id="chatInput" type="text" placeholder="Ask a question..." style="flex:1;">
            <button id="chatSendBtn" class="chat-send-btn">Send</button>
        </div>
    </div>

    <script>
        window.currentStore = null;

        const chatbotToggle = document.getElementById("chatbotToggle");
        const chatbotPanel = document.getElementById("chatbotPanel");
        const chatMessages = document.getElementById("chatMessages");
        const chatInput = document.getElementById("chatInput");
        const chatSendBtn = document.getElementById("chatSendBtn");

        chatbotToggle.addEventListener("click", () => {
            chatbotPanel.style.display = chatbotPanel.style.display === "flex" ? "none" : "flex";
        });

        function addChatMessage(text, sender = "bot") {
            const bubble = document.createElement("div");
            bubble.style.alignSelf = sender === "user" ? "flex-end" : "flex-start";
            bubble.style.background = sender === "user" ? "#2563eb" : "white";
            bubble.style.color = sender === "user" ? "white" : "#1e293b";
            bubble.style.padding = "10px 12px";
            bubble.style.borderRadius = "12px";
            bubble.style.maxWidth = "85%";
            bubble.style.whiteSpace = "pre-wrap";
            bubble.style.boxShadow = sender === "user" ? "none" : "0 1px 4px rgba(0,0,0,0.08)";
            bubble.textContent = text;
            chatMessages.appendChild(bubble);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function getCurrentStoreId() {
            const ids = [
                "storeDropdown",
                "customerStoreDropdown",
                "exploreStore",
                "store1",
                "store2"
            ];

            for (const id of ids) {
                const el = document.getElementById(id);
                if (el && el.value) {
                    window.currentStore = Number(el.value);
                    return window.currentStore;
                }
            }

            return window.currentStore;
        }

        function getCurrentPageName() {
            const path = window.location.pathname;
            if (path === "/") return "home";
            return path.replace("/", "");
        }

        async function sendChatMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            addChatMessage(message, "user");
            chatInput.value = "";

            addChatMessage("Thinking...", "bot");
            const thinkingBubble = chatMessages.lastChild;

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        message: message,
                        store_id: getCurrentStoreId(),
                        page: getCurrentPageName()
                    })
                });

                const data = await res.json();
                thinkingBubble.textContent = data.answer || "No response received.";
            } catch (err) {
                thinkingBubble.textContent = "Something went wrong while contacting the chatbot.";
            }
        }

        chatSendBtn.addEventListener("click", sendChatMessage);

        chatInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                sendChatMessage();
            }
        });
    </script>

</body>
</html>
