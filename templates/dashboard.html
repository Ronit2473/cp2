{% extends "base.html" %}

{% block title %}Dashboard | Retail ML Platform{% endblock %}

{% block content %}

<div class="section-box">
    <div class="controls">
        <label for="storeDropdown">Select Store:</label>
        <select id="storeDropdown"></select>
    </div>
</div>

<h2 class="section-title">Store Performance (Historical)</h2>
<div class="card-grid" id="storeKpiContainer"></div>

<div class="chart-wrap">
    <h2 class="section-title">7-Day Sales Forecast</h2>
    <div class="chart-box">
        <canvas id="forecastChart"></canvas>
    </div>
</div>

<script>
let forecastChartInstance = null;

function formatValue(key, value) {
    if (value === null || value === undefined || value === "nan" || value === "NaN") {
        return "N/A";
    }

    const currencyKeys = [
        "Total_Sales",
        "Avg_Daily_Sales",
        "Sales_per_Customer"
    ];

    const integerKeys = [
        "Total_Customers",
        "Promo_Days",
        "Sales_Rank",
        "Total_Open_Days"
    ];

    if (currencyKeys.includes(key)) {
        const num = Number(value);
        if (isNaN(num)) return value;
        return "$" + num.toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }

    if (integerKeys.includes(key)) {
        const num = Number(value);
        if (isNaN(num)) return value;
        return num.toLocaleString();
    }

    if (typeof value === "number") {
        return value.toLocaleString(undefined, {
            minimumFractionDigits: 0,
            maximumFractionDigits: 2
        });
    }

    return value;
}

function prettyLabel(key) {
    return key.replaceAll("_", " ");
}

function createCards(containerId, data) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";

    Object.entries(data).forEach(([key, value]) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="card-label">${prettyLabel(key)}</div>
            <div class="card-value">${formatValue(key, value)}</div>
        `;
        container.appendChild(card);
    });
}

async function loadStores() {
    const res = await fetch("/stores");
    const stores = await res.json();

    const dropdown = document.getElementById("storeDropdown");
    dropdown.innerHTML = "";

    stores.forEach(store => {
        const option = document.createElement("option");
        option.value = store;
        option.textContent = "Store " + store;
        dropdown.appendChild(option);
    });

    if (stores.length > 0) {
        await loadStoreDashboard(stores[0]);
    }

    dropdown.addEventListener("change", async function () {
        await loadStoreDashboard(this.value);
    });
}

async function loadStoreDashboard(storeId) {
    const res = await fetch(`/store-dashboard/${storeId}`);
    const data = await res.json();

    if (data.error) {
        document.getElementById("storeKpiContainer").innerHTML = `<p>${data.error}</p>`;
        return;
    }

    createCards("storeKpiContainer", data.kpis);
    renderForecastChart(data.forecast || []);
}

function renderForecastChart(forecast) {
    const ctx = document.getElementById("forecastChart").getContext("2d");

    if (forecastChartInstance) {
        forecastChartInstance.destroy();
    }

    forecastChartInstance = new Chart(ctx, {
        type: "line",
        data: {
            labels: ["Day 1", "Day 2", "Day 3", "Day 4", "Day 5", "Day 6", "Day 7"],
            datasets: [{
                label: "Predicted Sales ($)",
                data: forecast,
                borderColor: "#3b82f6",
                backgroundColor: "rgba(59,130,246,0.15)",
                fill: false,
                tension: 0.3,
                pointRadius: 5,
                pointHoverRadius: 7
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            return " $" + Number(context.raw).toLocaleString(undefined, {
                                minimumFractionDigits: 2,
                                maximumFractionDigits: 2
                            });
                        }
                    }
                }
            },
            scales: {
                y: {
                    ticks: {
                        callback: function(value) {
                            return "$" + Number(value).toLocaleString();
                        }
                    }
                }
            }
        }
    });
}

loadStores();
</script>

{% endblock %}
